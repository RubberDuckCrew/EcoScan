name: Test, Build

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, labeled, synchronize]

jobs:
  app:
    uses: RubberDuckCrew/expo-workflow/.github/workflows/workflow-build.yml@670e9d7ad7f7a094cba494663a9bf615928668c3 # v1.0.1

    permissions:
      contents: write
      pull-requests: write

    with:
      app-name: 'EcoScan'
      working-directory: 'ecoscan_app'
      java-version: '21'
      gradle-version: '9.0.0'
      node-version: '24'
      skip-dependency-check: false

  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ecoscan_backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: 25
          distribution: "temurin"
          cache: "maven"
          cache-dependency-path: "./ecoscan_backend/pom.xml"

      - name: Build with Maven
        run: mvn --update-snapshots install

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-target
          path: "**/target"

  ai:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ecoscan_ai

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run lint
        run: uv run poe lint

  images:
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    needs: [backend, ai]
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - component: backend
            context: ecoscan_backend
            artifact: backend-target
          - component: ai
            context: ecoscan_ai

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}/${{ matrix.component }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download build artifacts
        if: ${{ matrix.artifact }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ matrix.artifact }}

      - name: Log in to the Container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
