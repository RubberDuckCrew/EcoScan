id: add roles
author: Default
realm: local_realm
changes:
  - addRole:
      name: ecoscan-user
      description: Default user role
      clientRole: false

  - addRole:
      name: ecoscan-ai
      description: Allows CrewAI agents read-only access to defined backend endpoints
      clientRole: false

  - updateRole:
      name: default-roles-local_realm
      description: role_default-roles
      composite: true
      clientRole: false
      compositeChildRoles:
        - name: ecoscan-user
