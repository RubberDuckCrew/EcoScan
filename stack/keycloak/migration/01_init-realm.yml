id: init realm
author: Default
changes:
  - addRealm:
      name: local_realm

  - updateRealm:
      id: local_realm
      loginTheme: ecoscan-theme
      displayName: EcoScan
      registrationAllowed: true

  - addClientScope:
      realm: local_realm
      name: openid
      description: Client scope used for OpenID Connect (OIDC) based authentication

  - addRealmProfileAttribute:
      realm: local_realm
      name: "custom_sub"
      permissions:
        view:
          - admin
        edit:
          - admin
