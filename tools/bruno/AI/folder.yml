info:
  name: AI
  type: folder
  seq: 1

request:
  auth:
    type: oauth2
    flow: client_credentials
    accessTokenUrl: http://localhost:8100/auth/realms/local_realm/protocol/openid-connect/token
    credentials:
      clientId: ai-service
      clientSecret: ai-service-client-secret
      placement: basic_auth_header
    scope: openid
    tokenConfig:
      id: credentials
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: true
      autoRefreshToken: true
