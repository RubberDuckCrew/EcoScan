info:
  name: History List
  type: http
  seq: 2

http:
  method: GET
  url: "{{backend}}/history/list?page=0&size=10"
  params:
    - name: page
      value: "0"
      type: query
    - name: size
      value: "10"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
