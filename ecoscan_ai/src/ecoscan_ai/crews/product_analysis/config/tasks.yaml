analysis_task:
  description: >
    Analyze the product: {productName} with description: {productDescription}.
    Product ID: {productId}.
    Provide comprehensive analysis including market overview, key features,
    target audience, and competitive advantages.
  expected_output: >
    A detailed market analysis covering: market overview, key product features,
    target audience analysis, competitive advantages, and strategic positioning.
  agent: product_analyzer

recommendation_task:
  description: >
    Based on the product analysis provided, generate strategic recommendations
    for product positioning, marketing, and growth opportunities.
  expected_output: >
    Strategic recommendations for product success including positioning,
    marketing strategy, and key growth opportunities.
  agent: recommendation_agent


