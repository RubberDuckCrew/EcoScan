research_alternatives_task:
  description: >
    Analyze the provided product category ({categories}).
    Use the "Search by category tool" tool with this format:
    {{"category": "your_category_here"}} to search our internal
    product database for alternative products in the same or a closely
    related category. Use the "Search products by category" tool ONCE with it.
    Use ONLY the EAN numbers returned by the tool, maximum 10.
  expected_output: >
    A list of alternative product EAN numbers
  agent: alternatives_researcher

find_coordinates_task:
  description: >
    Use the "Find nearby stores" tool with the user coordinates
    latitude and longitude from {user_coordinates} (format: "lat,lon").
    Call the "Find nearby stores" tool ONCE with these exact numeric values.
    Use ONLY the store names, latitudes and longitudes returned by the tool.
    Do NOT return tool names or parameters.
  expected_output: >
    A JSON list of nearby stores with their name, latitude, and longitude.
  agent: coordinates_researcher
