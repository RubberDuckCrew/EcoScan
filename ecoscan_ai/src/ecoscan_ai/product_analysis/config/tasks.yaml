analysis_task:
  description: >
    Analyze the product: {productName} with the categories: {productDescription}
    and product ID: {productId}.
    Gather all available data about the product focusing on: its identifying features, ecological 
    impact, sustainability aspects amd any other relevant information that can be found.
  expected_output: >
    A comprehensive report about the product, including but not limited to:
    - Identifying features
    - Ecological impact
    - Sustainability aspects
    - Any other relevant information that can be found.
  agent: product_analyzer